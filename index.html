<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Responsive Word Processor</title>
    <!-- Include necessary libraries for formatting and exports -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-summernote/0.8.18/summernote.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-summernote/0.8.18/summernote.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }
        #editor, #preview { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        #editor { min-height: 200px; }
        .tabs { display: flex; cursor: pointer; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #f1f1f1; }
        .tab.active { background: #ddd; }
    </style>
</head>
<body>
<div class="container">
    <h1>Mobile Responsive Word Processor</h1>
    <div class="tabs">
        <div id="editorTab" class="tab active">Editor</div>
        <div id="previewTab" class="tab">Preview</div>
    </div>
    <div id="editor"></div>
    <div id="preview" style="display:none;"></div>
    <div>
        <button id="exportWord">Export as Word</button>
        <button id="exportExcel">Export as Excel</button>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#editor').summernote({
            height: 300,
            toolbar: [
                ['style', ['bold', 'italic', 'underline', 'clear']],
                ['font', ['strikethrough', 'superscript', 'subscript']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['height', ['height']],
                ['insert', ['link', 'picture', 'video']],
                ['view', ['fullscreen', 'codeview', 'help']]
            ],
            callbacks: {
                onChange: function(contents) {
                    $('#preview').html(contents);
                }
            }
        });

        $('#editorTab').click(function() {
            $('#editor').show();
            $('#preview').hide();
            $(this).addClass('active');
            $('#previewTab').removeClass('active');
        });

        $('#previewTab').click(function() {
            $('#editor').hide();
            $('#preview').show();
            $(this).addClass('active');
            $('#editorTab').removeClass('active');
        });

        $('#exportWord').click(function() {
            // Logic for exporting to Word goes here
            alert('Export to Word functionality not implemented.');
        });

        $('#exportExcel').click(function() {
            // Logic for exporting to Excel goes here
            alert('Export to Excel functionality not implemented.');
        });
    });
</script>
</body>
</html>
